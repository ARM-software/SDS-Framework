layer:
  type: SDSIO
  description: SDSIO layer for RTT connection to Host

  packs:
    - pack: ARM::SDS@^3.0.0-0
    - pack: SEGGER::RTT

  connections:
    - connect: SDS RecPlay
      consumes:
        - CMSIS-RTOS2
      provides:
        - SDS_STREAM
        - SDS_IO

  components:
    - component: SDS:Stream&CMSIS-RTOS2
    - component: SDS:IO:RTT
    - component: SEGGER:RTT
