layer:
  type: SDSIO
  description: Layer with SDS and an I/O interface using RTT connection to the SDSIO Server

  packs:
    - pack: ARM::SDS@^3.0.0-0
    - pack: SEGGER::RTT

  connections:
    - connect: SDS
      consumes:
        - CMSIS-RTOS2
      provides:
        - SDS
        - SDSIO

  components:
    - component: SDS:Stream&CMSIS-RTOS2
    - component: SDS:IO:RTT
    - component: SEGGER:RTT
