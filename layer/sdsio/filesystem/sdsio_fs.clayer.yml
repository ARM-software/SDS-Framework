layer:
  type: SDSIO
  description: Layer with SDS and an I/O interface using the device local file system

  packs:
    - pack: ARM::SDS@^3.0.0-0
    - pack: ARM::CMSIS-Compiler@^2.1.0
    - pack: Keil::MDK-Middleware@^8.0.0

  connections:
    - connect: SDS
      consumes:
        - CMSIS_MCI
        - CMSIS-RTOS2
      provides:
        - SDS
        - SDSIO

  components:
    - component: SDS:Stream&CMSIS-RTOS2
    - component: SDS:IO:File System&MDK FS
    - component: CMSIS-Compiler:File Interface:MDK-MW File System
    - component: File System&MDK:CORE
    - component: File System&MDK:Drive:Memory Card
