layer:
  type: SDSIO
  description: Layer with SDS and an I/O interface using USB connection to the SDSIO Server

  packs:
    - pack: ARM::SDS@^3.0.0-0
    - pack: Keil::MDK-Middleware@^8.0.0

  connections:
    - connect: SDS
      consumes:
        - CMSIS_USB_Device
        - CMSIS-RTOS2
      provides:
        - SDS
        - SDSIO

  components:
    - component: SDS:Stream&CMSIS-RTOS2
    - component: SDS:IO:USB&MDK USB
    - component: USB&MDK:CORE
    - component: USB&MDK:Device
    - component: USB&MDK:Device:Custom Class
