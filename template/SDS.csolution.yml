solution:
  description: SDS recorder/player reference example
  created-for: CMSIS-Toolbox@2.12.0
  cdefault:

  # List of tested compilers that can be selected
  select-compiler:
    - compiler: AC6
    - compiler: GCC
    - compiler: IAR

  # This is a CMSIS-Toolbox Reference Application that requires a compatible board layer
  # Refer to https://open-cmsis-pack.github.io/cmsis-toolbox/ReferenceApplications/ for more information

  packs:
    - pack: ARM::SDS@^3.0.0-0
    - pack: ARM::V2M_MPS3_SSE_300_BSP@^1.5.0
    - pack: ARM::SSE_320_BSP@^1.1.0

  # List different hardware targets that are used to deploy the solution.
  target-types:
    - type: SSE-300-U55
      board: V2M-MPS3-SSE-300-FVP
      device: SSE-300-MPS3
      define:
        - SIMULATOR
      variables:
        - Board-Layer: $SolutionDir()$/Board/Corstone-300/Board-U55.clayer.yml
        - SDSIO-Layer: $SolutionDir()$/sdsio/fvp/sdsio_fvp.clayer.yml
      target-set:
        - set:
          images:
            - project-context: DataTest.Debug
          debugger:
            name: Arm-FVP
            model: FVP_Corstone_SSE-300_Ethos-U55
            config-file: Board/Corstone-300/fvp_config.txt

    - type: SSE-320-U85
      board: SSE-320
      device: SSE-320-FVP
      define:
        - SIMULATOR
      variables:
        - Board-Layer: $SolutionDir()$/Board/Corstone-320/Board-U85.clayer.yml
        - SDSIO-Layer: $SolutionDir()$/sdsio/fvp/sdsio_fvp.clayer.yml
      target-set:
        - set:
          images:
            - project-context: DataTest.Debug
          debugger:
            name: Arm-FVP
            model: FVP_Corstone_SSE-320
            config-file: Board/Corstone-320/fvp_config.txt

  # List of different build configurations.
  build-types:
    - type: Debug
      debug: on
      optimize: debug

    - type: Release
      debug: off
      optimize: balanced
      define:
        - SDS_STDIO: 0

  # List related projects.
  projects:
    - project: datatest/DataTest.cproject.yml
    - project: algorithm/AlgorithmTest.cproject.yml
