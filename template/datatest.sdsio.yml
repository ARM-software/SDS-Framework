sdsio:
  interface:
# Remove when using a different interface
    usb:

# Uncomment to use Network interface
#   socket:        

# Uncomment to use RTT interface
#   socket:
#     connect: "$$SEGGER_TELNET_ConfigStr=RTTCh;1$$"
#     port: 19021

  workdir: ./datatest/SDS Recordings
  metadir: ./datatest/SDS Recordings

  # Data stream information used by VS Code extension
  streams:
    - name: Test_In
      view: signal
    - name: Test_Out
      view: signal
  
  # Human readable labels for sdsFlag bits use by VS Code extension
  flag-info:
    - 0: User-Flag 0
    - 1: User-Flag 1

  # Defines a playback test sequence
  play:
    - step: "Test 0"
      labels: [ 0 ]
