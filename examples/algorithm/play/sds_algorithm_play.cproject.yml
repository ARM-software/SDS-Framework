project:
  description: Playback input and record output data of an algorithm

  connections:
    - connect: ML Sensor demo
      provides:
        - CMSIS-RTOS2
      consumes:
        - SDS_REC_PLAY
        - CMSIS_VIO
        - STDIN
        - STDOUT
        - STDERR
        - Heap: 65536

  packs:
    - pack: ARM::CMSIS@^6.2.0-0
    - pack: ARM::CMSIS-RTX@^5.9.0

  components:
    - component: CMSIS:OS Tick:SysTick
    - component: CMSIS:RTOS2:Keil RTX5&Source

  groups:
    - group: Documentation
      files:
        - file: README.md
    - group: Application
      add-path:
        - ../../control
      files:
        - file: app_main.c
        - file: ../../control/sds_control.c
        - file: sds_algorithm.c
        - file: sds_algorithm_data_in.c

  layers:
    - layer: $Board-Layer$
      type:  Board
    - layer: $sds_interface-Layer$
      type:  sds_interface

  output:
    type:
    - map